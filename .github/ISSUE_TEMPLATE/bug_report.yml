name: Bug Report
description: Report a bug
title: "bug: "
labels: ["bug"]
body:
  - type: textarea
    id: bug_description
    attributes:
      label: Bug Description
      description: Briefly describe what happened.
      placeholder: e.g. Panics when calling foo()
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Provide clear steps to reproduce the issue.
      value: |
        1. Step 1
        2. Step 2
        3. Step 3
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: Describe what should happen.
      placeholder: e.g. Should return Ok(...) without panicking
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: Describe what actually happens.
      placeholder: e.g. thread 'main' panicked at ...
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Rust toolchain version, OS, and any other relevant details.
      placeholder: |
        - Rust: 1.87.0 (rustup show)
        - OS: macOS 15
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, backtraces, or anything else that might help.
    validations:
      required: false
